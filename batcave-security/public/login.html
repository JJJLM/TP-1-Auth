<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — Batcave</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <a class="brand" href="#">BATCAVE</a>
      <ul>
        <li><a href="/login.html">Connexion</a></li>
        <li><a href="/register.html">Inscription</a></li>
      </ul>
    </nav>

    <main>
      <h1>Accès Batcave</h1>
      <p>Identifie-toi pour accéder au Bat-Computer</p>
      <form id="login-form">
        <div>
          <label for="username">Nom de justicier</label>
          <input type="text" name="username" id="username" required />
        </div>
        <div>
          <label for="password">Mot de passe secret</label>
          <input type="password" name="password" id="password" required />
        </div>
        <button type="submit">Entrer dans la Batcave</button>
      </form>
      <p style="margin-top: 1.25rem;">
        Pas encore inscrit ? <a href="/register.html">Rejoins la Batcave</a>
      </p>
      <p id="message"></p>
    </main>

    <script src="login.js"></script>
  </body>
</html>
